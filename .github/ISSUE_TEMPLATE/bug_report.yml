name: Bug Report
description: Report a bug or unexpected behavior in FocusFlow
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug. Please fill out the information below to help us understand and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what the bug is
      placeholder: Tell us what went wrong
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue? Please be as specific as possible.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
      placeholder: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
      placeholder: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment type
      description: Are you using the hosted version or self-hosting?
      options:
        - Hosted (focusflow.app)
        - Self-hosted (Docker)
        - Self-hosted (other)
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: What version of FocusFlow are you using? (Check footer or package.json)
      placeholder: e.g., v1.0.0

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser are you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other (specify in additional context)
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: What OS are you using?
      placeholder: e.g., macOS 13.2, Windows 11, Ubuntu 22.04
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error messages or logs
      description: If applicable, paste any error messages or console logs
      placeholder: Paste error messages here
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here

  - type: checkboxes
    id: willing-to-pr
    attributes:
      label: Are you willing to submit a PR to fix this?
      options:
        - label: Yes, I can work on a fix
        - label: I need guidance on how to fix this
        - label: No, I cannot work on this
